name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Validate build env
        run: test -n "$VITE_DIRECTUS_URL"
        env:
          VITE_DIRECTUS_URL: ${{ vars.VITE_DIRECTUS_URL }}

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_APP_ENV: "prod"
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_DIRECTUS_URL: ${{ vars.VITE_DIRECTUS_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy
        uses: actions/deploy-pages@v4
